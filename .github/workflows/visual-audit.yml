name: Visual Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/visual-audit.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/visual-audit.yml'

jobs:
  visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Start Next.js dev server
        run: npm run dev > dev-server.out.log 2> dev-server.err.log &

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000/admin

      - name: Run visual audit
        run: npm run audit:visual

      - name: Upload visual audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-audit-${{ github.run_id }}
          path: |
            tmp/audit/**
            dev-server.out.log
            dev-server.err.log
          if-no-files-found: warn
