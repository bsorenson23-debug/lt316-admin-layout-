services:
  app:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "npm install && npm run dev -- -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - ./storage/pipeline-jobs:/data/jobs

  asset-pipeline:
    build:
      context: ./services/asset-pipeline
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - JOB_STORAGE_ROOT=/data/jobs
      - PORT=3100
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    volumes:
      - ./storage/pipeline-jobs:/data/jobs
