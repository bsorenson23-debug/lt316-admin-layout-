name: Visual Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: |
          npx playwright install --with-deps chromium

      - name: Build app
        run: |
          npm run build > build.log 2>&1

      - name: Start admin app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > app.log 2>&1 &
          npx --yes wait-on http://127.0.0.1:3000/admin --timeout 120000 || (cat app.log && exit 1)

      - name: Run visual audit
        run: npm run audit:visual:local

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-audit-artifacts
          path: |
            tmp/audit
            app.log
            build.log
          if-no-files-found: warn
